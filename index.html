<body class="body">
    <h1 class="mainHeader">Lista zadań</h1>
    <form class="form__container js-form">
        <h2 class="form__header">Dodaj nowe zadanie</h2>
        <input minlength="1" maxlength="350" class="form__input js-addNewTask__input" name="task" type="text"
            placeholder="Co jest do zrobienia?"> <button class="form__button js-saveTask__button">Dodaj
            zadanie</button>
    </form>
    <div class="tasksList__container">
        <h2 class="tasksList__header">Lista zadań</h2>
        <ul class="js-tasksList"></ul>
    </div>
