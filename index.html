<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <script defer src="js/script.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form.css">

<body class="body">

    <h1 class="mainHeader">Lista zadań</h1>

    <form class="form">
        <h2 class="form__header">Dodaj nowe zadanie</h2>
        <input minlength="1" maxlength="350" class="form__input" required name="task" type="text"
            placeholder="Wypisz swoją listę zadań"> <button>Zapisz plany</button>
    </form>

</body>

</html>
